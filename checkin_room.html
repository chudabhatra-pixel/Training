<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:linear-gradient(135deg,#0f2044 0%,#1a3260 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:24px;padding:36px 28px;max-width:400px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.logo{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,#0f2044,#1a3260);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px}
.title{font-size:22px;font-weight:800;color:#0f2044;margin-bottom:4px}
.sub{font-size:13px;color:#64748b;margin-bottom:28px;line-height:1.5}
.input-wrap{position:relative;margin-bottom:16px}
.tms-input{width:100%;padding:14px 18px;border:2px solid #e2e8f0;border-radius:12px;font-size:16px;font-family:inherit;font-weight:600;text-align:center;letter-spacing:2px;text-transform:lowercase;transition:border-color .15s;color:#0f2044}
.tms-input:focus{outline:none;border-color:#1e6fbf}
.tms-input::placeholder{letter-spacing:0;font-weight:400;color:#94a3b8}
.btn{width:100%;padding:16px;border-radius:12px;border:none;cursor:pointer;font-size:17px;font-family:inherit;font-weight:700;transition:all .15s;background:linear-gradient(135deg,#0f2044,#1e6fbf);color:#fff;box-shadow:0 4px 16px rgba(15,32,68,.3)}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(15,32,68,.4)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.hint{font-size:12px;color:#94a3b8;margin-top:12px}
/* Result states */
.result{display:none;margin-top:0}
.success-icon{font-size:64px;animation:pop .4s ease;margin-bottom:12px}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.success-title{font-size:24px;font-weight:800;color:#065f46;margin-bottom:6px}
.success-time{font-size:13px;color:#64748b;margin-bottom:20px}
.info-box{background:#f0fdf4;border:1.5px solid #6ee7b7;border-radius:12px;padding:16px;text-align:left;margin-bottom:16px}
.info-name{font-size:20px;font-weight:700;color:#065f46;margin-bottom:2px}
.info-th{font-size:13px;color:#059669;margin-bottom:8px}
.info-row{font-size:13px;color:#047857;display:flex;gap:8px;margin-bottom:3px}
.info-label{min-width:60px;opacity:.7}
.already-box{background:#dbeafe;border:1.5px solid #93c5fd;border-radius:12px;padding:16px;margin-bottom:16px;text-align:left}
.already-title{font-size:16px;font-weight:700;color:#1e3a8a;margin-bottom:4px}
.err-box{background:#fee2e2;border:1.5px solid #fca5a5;border-radius:12px;padding:16px;margin-bottom:16px}
.err-title{font-size:16px;font-weight:700;color:#991b1b;margin-bottom:4px}
.err-msg{font-size:13px;color:#dc2626}
.btn-again{width:100%;padding:13px;border-radius:12px;border:2px solid #e2e8f0;background:#fff;font-size:15px;font-family:inherit;font-weight:600;cursor:pointer;color:#0f2044;transition:all .15s;margin-top:4px}
.btn-again:hover{border-color:#0f2044}
.footer{margin-top:20px;font-size:11px;color:rgba(255,255,255,.5);text-align:center}
.footer a{color:rgba(255,255,255,.7);font-weight:600}
.spinner{width:24px;height:24px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

function nowStr(){
  const d=new Date();
  return d.toLocaleDateString('th-TH',{year:'numeric',month:'short',day:'numeric',timeZone:'Asia/Bangkok'})+' '+d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'Asia/Bangkok'});
}

// Enter key support
document.getElementById('tmsInput').addEventListener('keydown', e => {
  if(e.key==='Enter') doCheckin();
});

async function doCheckin(){
  const tms = document.getElementById('tmsInput').value.trim().toLowerCase();
  if(!tms){ document.getElementById('tmsInput').focus(); return; }

  const emp = EMPLOYEES.find(e => e[5] === tms);
  if(!emp){
    showResult(`
      <div class="err-box">
        <div class="err-title">❌ ไม่พบรหัส TMS</div>
        <div class="err-msg">ไม่พบรหัส "<strong>${tms}</strong>" ในระบบ<br>กรุณาตรวจสอบรหัสแล้วลองใหม่</div>
      </div>
      <button class="btn-again" onclick="resetForm()">🔄 ลองใหม่</button>
    `);
    return;
  }

  const [eng,nick,th,thnick,pos] = emp;
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>กำลังบันทึก...';

  const time = nowStr();
  try {
    const res = await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'roomCheckin', tms, name:eng, nick, thname:th, thnick, pos, time})});
    const result = await res.json();

    if(result.alreadyChecked){
      showResult(`
        <div class="already-box">
          <div class="already-title">ℹ️ เช็คอินไปแล้ว</div>
          <div style="font-size:13px;color:#1e40af">เช็คอินเมื่อ ${result.data.time}</div>
        </div>
        <div style="background:#f0fdf4;border-radius:12px;padding:16px;text-align:left;margin-bottom:16px">
          <div class="info-name">${nick} (${thnick})</div>
          <div class="info-th">${th}</div>
          <div class="info-row"><span class="info-label">TMS</span><span style="font-family:monospace">${tms}</span></div>
        </div>
        <a href="https://line.me/R/meeting/0e0d3898dadb4b3da04a9b40b5f45aa0" style="display:block;width:100%;padding:15px;border-radius:12px;background:#06C755;color:#fff;font-size:16px;font-weight:700;text-decoration:none;margin-bottom:12px;text-align:center">📹 เข้าห้องประชุม Line</a>
        <button class="btn-again" onclick="resetForm()">← ย้อนกลับหน้าเช็คอิน</button>
      `);
    } else {
      showResult(`
        <div class="success-icon">🎉</div>
        <div class="success-title">เช็คอินสำเร็จ!</div>
        <div class="success-time">${time}</div>
        <div class="info-box">
          <div class="info-name">${nick} (${thnick})</div>
          <div class="info-th">${th}</div>
          <div class="info-row"><span class="info-label">TMS</span><span style="font-family:monospace">${tms}</span></div>
          <div class="info-row"><span class="info-label">ตำแหน่ง</span><span>${pos}</span></div>
        </div>
        <a href="https://line.me/R/meeting/0e0d3898dadb4b3da04a9b40b5f45aa0" style="display:block;width:100%;padding:15px;border-radius:12px;background:#06C755;color:#fff;font-size:16px;font-weight:700;text-decoration:none;margin-bottom:12px;text-align:center">📹 เข้าห้องประชุม Line</a>
        <button class="btn-again" onclick="resetForm()">← ย้อนกลับหน้าเช็คอิน</button>
      `);
    }
  } catch(e){
    btn.disabled = false;
    btn.innerHTML = '✅ เช็คอินเข้าห้อง';
    showResult(`
      <div class="err-box">
        <div class="err-title">⚠️ เชื่อมต่อไม่ได้</div>
        <div class="err-msg">กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่</div>
      </div>
      <button class="btn-again" onclick="resetForm()">🔄 ลองใหม่</button>
    `);
  }
}

function showResult(html){
  document.getElementById('formView').style.display = 'none';
  const r = document.getElementById('resultView');
  r.style.display = 'block';
  r.innerHTML = html;
}

function resetForm(){
  document.getElementById('formView').style.display = 'block';
  document.getElementById('resultView').style.display = 'none';
  document.getElementById('resultView').innerHTML = '';
  const btn = document.getElementById('submitBtn');
  btn.disabled = false;
  btn.innerHTML = '✅ เช็คอินเข้าห้อง';
  const input = document.getElementById('tmsInput');
  input.value = '';
  input.focus();
}
</script>

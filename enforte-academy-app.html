<style>
:root{
  --bg:#F1F5FB; --surface:#FFFFFF; --surface-2:#F4F7FC;
  --ink:#16233F; --muted:#6C7A97; --muted-2:#9AA6BE;
  --line:rgba(30,50,90,.09); --line-2:rgba(30,50,90,.14);
  --green:#5F9E38; --green-2:#7EAF3C; --green-ink:#3C6B24; --green-bg:#EDF5E4;
  --blue:#4F7CFF; --blue-bg:#EAF2FF; --pink:#FF6B9D; --pink-bg:#FFF0F7;
  --purple:#9A6BFF; --purple-bg:#F1ECFB; --teal:#00C2A8; --teal-bg:#E7F7F1;
  --amber:#FF9F3E; --amber-bg:#FFF3DE; --gold:#F5B93C; --danger:#E5533C;
  --r:22px; --r-sm:15px;
  --sh-1:0 1px 2px rgba(30,42,34,.05);
  --sh-2:0 2px 6px rgba(40,60,110,.05), 0 14px 34px -20px rgba(40,60,110,.30);
  --sh-3:0 4px 10px rgba(40,60,110,.06), 0 26px 52px -24px rgba(40,60,110,.36);
  --fd:'Baloo 2',cursive; --fb:'IBM Plex Sans Thai',-apple-system,system-ui,sans-serif;
  --side:250px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;line-height:1.55;min-height:100vh}
body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
   radial-gradient(600px 380px at 14% 4%, rgba(126,175,60,.13), transparent 70%),
   radial-gradient(560px 380px at 96% 2%, rgba(79,124,255,.11), transparent 70%),
   radial-gradient(620px 420px at 88% 96%, rgba(0,194,168,.09), transparent 70%);}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit}
a{color:inherit;text-decoration:none}
.num{font-family:var(--fd);font-variant-numeric:tabular-nums}
svg{fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
@keyframes pop{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.an{opacity:0;animation:pop .5s cubic-bezier(.2,.9,.3,1.1) forwards}
.d1{animation-delay:.03s}.d2{animation-delay:.09s}.d3{animation-delay:.15s}.d4{animation-delay:.21s}.d5{animation-delay:.27s}.d6{animation-delay:.33s}
@media (prefers-reduced-motion:reduce){.an{animation:none;opacity:1}}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:rgba(30,50,90,.16);border-radius:20px;border:3px solid var(--bg)}

/* ============ LOGIN ============ */
#login{min-height:100vh;display:grid;place-items:center;padding:24px}
.login-card{width:100%;max-width:400px;background:#fff;border:1px solid var(--line);border-radius:26px;padding:30px 26px;box-shadow:var(--sh-3);text-align:center}
.login-card img{width:150px;margin:0 auto 14px;display:block}
.login-card p{color:var(--muted);font-size:13.5px;margin-bottom:20px}
.field{text-align:left;margin-bottom:13px}
.field label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin:0 0 6px 3px}
.inp{width:100%;background:var(--surface-2);border:1px solid var(--line-2);border-radius:13px;padding:13px 15px;font-size:15px;color:var(--ink)}
.inp:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 4px rgba(95,158,56,.13)}
.btn-primary{width:100%;background:linear-gradient(135deg,var(--green-2),var(--green));color:#fff;padding:14px;border-radius:14px;font-family:var(--fd);font-weight:700;font-size:16px;box-shadow:0 12px 24px -12px rgba(95,158,56,.8);transition:transform .12s}
.btn-primary:active{transform:scale(.98)}
.login-hint{margin-top:14px;font-size:12px;color:var(--muted-2)}
.login-hint b{color:var(--green)}
.err{color:var(--danger);font-size:13px;min-height:18px;margin-top:8px}

/* ============ SHELL ============ */
#app{display:none}
.shell{display:grid;grid-template-columns:var(--side) minmax(0,1fr);min-height:100vh}
.side{position:sticky;top:0;height:100vh;overflow-y:auto;padding:20px 14px;display:flex;flex-direction:column;gap:2px;
  background:rgba(255,255,255,.72);backdrop-filter:blur(12px);border-right:1px solid var(--line)}
.side .brand{padding:2px 8px 12px}
.side .brand img{width:132px;height:auto;display:block}
.side .lbl{font-size:10.5px;color:var(--muted-2);font-weight:700;padding:9px 12px 4px;letter-spacing:1px;text-transform:uppercase}
.snav{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:13px;color:var(--muted);font-weight:600;font-size:14px;transition:.14s;cursor:pointer;width:100%;text-align:left}
.snav svg{width:20px;height:20px;stroke:currentColor;flex-shrink:0}
.snav:hover{background:rgba(30,50,90,.05);color:var(--ink)}
.snav.on{background:var(--green-bg);color:var(--green-ink)}
.snav.on svg{stroke:var(--green)}
.snav .bdg{margin-left:auto;background:var(--pink);color:#fff;font-family:var(--fd);font-weight:700;font-size:10.5px;min-width:19px;height:19px;padding:0 5px;border-radius:20px;display:grid;place-items:center}
.side-foot{margin-top:auto;flex-shrink:0;position:relative;overflow:hidden;background:linear-gradient(150deg,var(--green-2),var(--teal));border-radius:18px;padding:13px;color:#fff;box-shadow:var(--sh-2)}
.side-foot::after{content:"";position:absolute;width:110px;height:110px;border-radius:50%;right:-38px;top:-40px;background:rgba(255,255,255,.16)}
.side-foot .r{display:flex;align-items:center;gap:10px;position:relative}
.side-foot .r>div:last-child{min-width:0;flex:1}
.side-foot b{font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.side-foot small{opacity:.85;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.side-foot .av{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,.22);display:grid;place-items:center;font-family:var(--fd);font-weight:700}
.side-foot .bars{display:flex;gap:8px;margin-top:11px;position:relative}
.side-foot .bars div{background:rgba(255,255,255,.15);border-radius:10px;padding:6px;flex:1;text-align:center;font-family:var(--fd);font-weight:700;font-size:13px}

.main{min-width:0;padding:20px clamp(16px,3vw,40px) 44px}
.inner{max-width:1240px;margin:0 auto}

/* topbar */
.top{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.top .hi{font-size:12.5px;color:var(--muted)}
.top .nm{font-family:var(--fd);font-weight:700;font-size:21px;line-height:1.05}
.search{flex:1;max-width:440px;display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px 15px;color:var(--muted-2);box-shadow:var(--sh-1)}
.search svg{width:18px;height:18px;stroke:currentColor}
.search input{border:none;background:none;outline:none;flex:1;font-size:14px;color:var(--ink)}
.top-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.chip{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:9px 13px;font-family:var(--fd);font-weight:700;font-size:14px;box-shadow:var(--sh-1)}
.chip.coin{color:#D89A16}.chip.xp{color:var(--green)}
.bell{width:44px;height:44px;border-radius:14px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;color:var(--muted);position:relative;box-shadow:var(--sh-1);transition:transform .15s}
.bell:active{transform:scale(.92)}.bell svg{width:20px;height:20px;stroke:currentColor}
.bell .b{position:absolute;top:-3px;right:-3px;min-width:19px;height:19px;padding:0 5px;border-radius:20px;background:var(--pink);color:#fff;font-family:var(--fd);font-weight:700;font-size:10.5px;line-height:1;display:grid;place-items:center;border:2px solid var(--bg)}
.mobile-brand{display:none}

/* hero */
.hero{position:relative;overflow:hidden;border-radius:26px;padding:26px 28px;margin-bottom:20px;color:#fff;background:linear-gradient(120deg,#6FB23F,#3E9E6B 52%,#2CC0A0);box-shadow:0 22px 50px -24px rgba(60,120,50,.6)}
.hero.blue{background:linear-gradient(120deg,#3E6FE0,#6E9BFF 55%,#9FD0FF)}
.hero.pink{background:linear-gradient(120deg,#FF6B9D,#B06BFF 60%,#7CC0FF)}
.hero.teal{background:linear-gradient(120deg,#0FB89A,#12C7B0 55%,#88F0CF)}
.hero.amber{background:linear-gradient(120deg,#F09A2E,#FFB93E 55%,#FFE08A);color:#3A2600}
.hero.purple{background:linear-gradient(120deg,#7B54D6,#9A6BFF 55%,#C6A6FF)}
.hero .blob{position:absolute;border-radius:50%;background:rgba(255,255,255,.14)}
.hero .b1{width:210px;height:210px;right:-46px;top:-70px;animation:float 7s ease-in-out infinite}
.hero .leaf{position:absolute;right:30px;top:24px;width:70px;opacity:.9;animation:float 6s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-11px) rotate(5deg)}}
.hero small{font-family:var(--fd);font-weight:600;text-transform:uppercase;letter-spacing:2px;font-size:10.5px;opacity:.85}
.hero h1{font-family:var(--fd);font-weight:800;font-size:28px;line-height:1.14;margin:8px 0 8px;position:relative;max-width:66%}
.hero p{font-size:13.5px;opacity:.93;line-height:1.6;position:relative;max-width:62%}
.hero-actions{display:flex;gap:10px;margin-top:16px;position:relative;flex-wrap:wrap}
.pill{border-radius:12px;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.4);color:inherit;padding:10px 15px;font-size:13px;font-weight:600;transition:transform .12s;display:inline-flex;align-items:center;gap:7px}
.pill:active{transform:scale(.95)}.pill.solid{background:#fff;color:var(--green-ink);border-color:#fff}
.pill svg{width:16px;height:16px;stroke:currentColor}

/* generic building blocks */
.grid2{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:22px;align-items:start}
.sect{font-family:var(--fd);font-weight:700;font-size:18px;margin:22px 2px 13px;display:flex;align-items:center;gap:9px}
.sect .rule{flex:1;height:1px;background:linear-gradient(90deg,var(--line-2),transparent)}
.sect .more{margin-left:auto;font-size:12.5px;color:var(--green);font-weight:600;font-family:var(--fb);cursor:pointer}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--sh-2)}
.card h3{font-family:var(--fd);font-weight:700;font-size:16px;margin-bottom:13px;display:flex;align-items:center;gap:8px}
.card h3 .more{margin-left:auto;font-size:12px;color:var(--green);font-weight:600;font-family:var(--fb);cursor:pointer}
.chips{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;margin-bottom:18px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip2{flex:0 0 auto;display:flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:10px 15px;font-size:13px;font-weight:600;box-shadow:var(--sh-1);transition:transform .12s,border-color .2s}
.chip2:hover{border-color:var(--green)}.chip2:active{transform:scale(.95)}.chip2 .e{font-size:15px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;border-radius:13px;font-family:var(--fd);font-weight:700;font-size:14px;transition:transform .12s}
.btn:active{transform:scale(.97)}
.btn-g{background:linear-gradient(135deg,var(--green-2),var(--green));color:#fff;box-shadow:0 12px 22px -12px rgba(95,158,56,.8)}
.btn-o{background:var(--surface-2);border:1px solid var(--line);color:var(--ink)}
.btn-sm{padding:9px 14px;font-size:13px}

/* launchpad tiles */
.pad{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:14px}
.tile{position:relative;overflow:hidden;min-height:138px;padding:17px;border-radius:20px;background:#fff;border:1px solid var(--line);box-shadow:var(--sh-2);cursor:pointer;transition:transform .18s cubic-bezier(.2,.8,.2,1.2),box-shadow .18s;text-align:left}
.tile:hover{transform:translateY(-5px);box-shadow:var(--sh-3)}
.tile:active{transform:translateY(-1px) scale(.99)}
.tile .e{font-size:30px;display:block;margin-bottom:10px;transition:transform .25s}
.tile:hover .e{transform:scale(1.14) rotate(-6deg)}
.tile b{font-family:var(--fd);font-weight:700;font-size:17px;display:block}
.tile span{display:block;font-size:12px;color:var(--muted);line-height:1.45;margin-top:3px}
.tile .tag{position:absolute;top:14px;right:14px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:20px;background:rgba(0,0,0,.05);color:var(--muted)}
.tile .orb{position:absolute;width:130px;height:130px;border-radius:50%;right:-36px;bottom:-46px;opacity:.5}
.tile.learn{background:linear-gradient(160deg,#fff,var(--blue-bg))}.tile.learn .orb{background:rgba(79,124,255,.15)}
.tile.chal{background:linear-gradient(160deg,#fff,var(--amber-bg))}.tile.chal .orb{background:rgba(245,185,60,.18)}
.tile.life{background:linear-gradient(160deg,#fff,var(--pink-bg))}.tile.life .orb{background:rgba(255,107,157,.14)}
.tile.share{background:linear-gradient(160deg,#fff,var(--teal-bg))}.tile.share .orb{background:rgba(0,194,168,.14)}
.tile.board{background:linear-gradient(160deg,#fff,#EEF3FF)}.tile.board .orb{background:rgba(154,107,255,.14)}
.tile.me{background:linear-gradient(160deg,#fff,var(--purple-bg))}.tile.me .orb{background:rgba(154,107,255,.13)}
.tile.path{background:linear-gradient(160deg,#fff,#EAF5FF)}.tile.path .orb{background:rgba(79,124,255,.13)}
.tile.kb{background:linear-gradient(160deg,#fff,var(--green-bg))}.tile.kb .orb{background:rgba(95,158,56,.14)}
.tile.calendar{background:linear-gradient(160deg,#fff,var(--amber-bg))}.tile.calendar .orb{background:rgba(255,159,62,.14)}
.tile.rewards{background:linear-gradient(160deg,#fff,var(--pink-bg))}.tile.rewards .orb{background:rgba(255,107,157,.13)}
.tile.coach{background:linear-gradient(160deg,#fff,var(--purple-bg))}.tile.coach .orb{background:rgba(154,107,255,.13)}
.tile.admin{background:linear-gradient(160deg,#fff,var(--blue-bg))}.tile.admin .orb{background:rgba(79,124,255,.13)}

/* check-in */
.checkin{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--sh-2);display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.ring{position:relative;width:100px;height:100px;flex-shrink:0}
.ring svg{transform:rotate(-90deg)}.ring .tk{stroke:#EDF1F7}.ring .fg{stroke:url(#rg);stroke-linecap:round;transition:stroke-dashoffset 1s cubic-bezier(.2,.8,.2,1)}
.ring .c{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
.ring .c b{font-family:var(--fd);font-weight:700;font-size:24px;line-height:1}.ring .c span{font-size:10px;color:var(--muted-2);display:block}
.ci-mid{flex:1;min-width:170px}
.streak{display:inline-flex;align-items:center;gap:6px;background:var(--amber-bg);color:#E07B1E;border:1px solid #FBE1C4;border-radius:20px;padding:5px 12px;font-family:var(--fd);font-weight:700;font-size:14px}
.streak .fl{animation:wob 1.6s ease-in-out infinite}@keyframes wob{0%,100%{transform:scale(1) rotate(-4deg)}50%{transform:scale(1.14) rotate(6deg)}}
.ci-mid h3{font-family:var(--fd);font-weight:700;font-size:18px;margin:10px 0 3px}.ci-mid p{font-size:12.5px;color:var(--muted)}
.big-btn{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:9px;padding:15px 26px;border-radius:15px;font-family:var(--fd);font-weight:700;font-size:16px;color:#fff;background:linear-gradient(135deg,var(--green-2),var(--green));box-shadow:0 14px 26px -14px rgba(95,158,56,.8);transition:transform .12s}
.big-btn:active{transform:scale(.97)}.big-btn.done{background:var(--green-bg);color:var(--green-ink);box-shadow:none;border:1px solid #D3E8CD}
.big-btn svg{width:19px;height:19px;stroke:currentColor}

/* rail bits */
.rail{display:flex;flex-direction:column;gap:16px}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.mini{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);padding:13px;text-align:center}
.mini .e{font-size:19px}.mini .v{font-family:var(--fd);font-weight:700;font-size:20px;margin-top:3px}.mini .k{font-size:11px;color:var(--muted-2)}
.lb{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--line)}.lb:last-child{border:none;padding-bottom:0}
.lb .r{width:25px;height:25px;border-radius:8px;display:grid;place-items:center;font-family:var(--fd);font-weight:700;font-size:12px;background:#F1F4F9;color:var(--muted)}
.lb .r.g1{background:#FFF3D6;color:#D89A16}.lb .r.g2{background:var(--blue-bg);color:var(--blue)}.lb .r.g3{background:var(--green-bg);color:var(--green)}
.lb .av{width:31px;height:31px;border-radius:9px;display:grid;place-items:center;font-family:var(--fd);font-weight:700;font-size:12px;color:#fff}
.lb .n{flex:1;font-size:13.5px;font-weight:500}.lb .n .tm{font-size:10.5px;color:var(--muted-2)}
.lb .p{font-family:var(--fd);font-weight:700;font-size:14px;color:var(--green)}
.annr{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}.annr:last-child{border:none;padding-bottom:0}
.annr .i{width:38px;height:38px;border-radius:11px;background:var(--surface-2);border:1px solid var(--line);display:grid;place-items:center;font-size:17px;flex-shrink:0}
.annr .t{font-weight:600;font-size:13.5px}.annr .s{font-size:12px;color:var(--muted);margin-top:1px}

/* mission / row list */
.rowi{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}.rowi:last-child{border:none;padding-bottom:0}
.rowi .ic{width:40px;height:40px;border-radius:12px;background:var(--surface-2);display:grid;place-items:center;font-size:19px;flex-shrink:0}
.rowi .tx{flex:1;min-width:0}.rowi .tx b{font-size:14px;font-weight:600}.rowi .tx span{font-size:12px;color:var(--muted);display:block}
.rowi .rt{font-family:var(--fd);font-weight:700;font-size:12.5px;color:var(--green);white-space:nowrap}

/* bars */
.bar{height:9px;border-radius:20px;background:var(--surface-2);overflow:hidden}
.bar>span{display:block;height:100%;border-radius:20px;transition:width 1s cubic-bezier(.2,.8,.2,1)}
.bar.blue>span{background:linear-gradient(90deg,var(--blue),#6E9BFF)}
.bar.green>span{background:linear-gradient(90deg,var(--green),var(--green-2))}
.bar.amber>span{background:linear-gradient(90deg,var(--amber),var(--gold))}
.bar.pink>span{background:linear-gradient(90deg,var(--pink),#FF9EC2)}

/* progress steps (learning path) */
.steps{position:relative;padding-left:8px}
.step{display:flex;gap:14px;padding-bottom:18px;position:relative}
.step:last-child{padding-bottom:0}
.step::before{content:"";position:absolute;left:17px;top:36px;bottom:-2px;width:2px;background:var(--line-2)}
.step:last-child::before{display:none}
.step .dot{width:36px;height:36px;border-radius:12px;display:grid;place-items:center;font-size:16px;flex-shrink:0;z-index:1;background:var(--surface-2);border:1px solid var(--line)}
.step.done .dot{background:var(--green);color:#fff;border-color:var(--green)}
.step.now .dot{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 0 0 4px var(--blue-bg)}
.step .sx{flex:1;padding-top:5px}.step .sx b{font-size:14.5px;font-weight:600}.step .sx span{font-size:12px;color:var(--muted);display:block;margin-top:1px}
.step .badge2{font-size:11px;font-weight:700;font-family:var(--fd);padding:3px 10px;border-radius:20px;background:var(--green-bg);color:var(--green-ink)}

/* feed / listings / etc reused (compact) */
.feed{display:flex;flex-direction:column;gap:14px}
.post{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--sh-2)}
.post .ph{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.post .av{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-family:var(--fd);font-weight:700;color:#fff;font-size:14px}
.post .nm{font-weight:600;font-size:14px}.post .mt{font-size:11.5px;color:var(--muted-2)}
.post .cap{font-size:14px;margin-bottom:11px;line-height:1.55}
.post .img{border-radius:14px;overflow:hidden;margin-bottom:11px;background:var(--surface-2)}
.post .img img{width:100%;display:block}
.reacts{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px}
.rx{border:1px solid var(--line);border-radius:20px;padding:6px 11px;font-size:13px;background:#fff;display:flex;align-items:center;gap:5px;transition:transform .12s}
.rx:active{transform:scale(.9)}.rx.on{background:var(--green-bg);border-color:var(--green)}
.cmts{border-top:1px solid var(--line);margin-top:6px;padding-top:10px}
.cmt{display:flex;gap:8px;font-size:13px;margin-bottom:7px}.cmt b{font-weight:600}
.cmt-add{display:flex;gap:8px;margin-top:8px}
.cmt-in{flex:1;background:var(--surface-2);border:1px solid var(--line);border-radius:20px;padding:9px 14px;font-size:13px;outline:none}
.cmt-send{background:var(--green);color:#fff;border-radius:20px;padding:0 16px;font-family:var(--fd);font-weight:700;font-size:13px}

.listings{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.listing{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:15px;box-shadow:var(--sh-2);transition:transform .18s,box-shadow .18s}
.listing:hover{transform:translateY(-3px);box-shadow:var(--sh-3)}
.listing .th{width:100%;height:120px;border-radius:14px;display:grid;place-items:center;font-size:44px;margin-bottom:11px;overflow:hidden}
.listing .th img{width:100%;height:100%;object-fit:cover}
.kind{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;padding:3px 9px;border-radius:20px;margin-bottom:6px}
.k-sell{background:var(--blue-bg);color:var(--blue)}.k-free{background:var(--green-bg);color:var(--green)}.k-auction{background:var(--amber-bg);color:#C77E15}
.listing .lt{font-weight:600;font-size:14.5px}.listing .ld{font-size:12px;color:var(--muted);margin:2px 0 9px;line-height:1.4}
.listing .pr{font-family:var(--fd);font-weight:700;font-size:17px;margin-bottom:10px}.listing .pr.free{color:var(--green)}

/* segmented */
.seg{display:flex;gap:4px;background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:4px;margin-bottom:16px}
.seg button{flex:1;padding:9px;border-radius:10px;font-size:13px;font-weight:600;color:var(--muted)}
.seg button.on{background:#fff;color:var(--green-ink);box-shadow:var(--sh-1)}

/* KB / list card */
.klist{display:flex;flex-direction:column;gap:2px}
.kitem{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--line);cursor:pointer}
.kitem:last-child{border:none}
.kitem .ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:19px;flex-shrink:0}
.kitem .tx{flex:1;min-width:0}.kitem b{font-size:14px;font-weight:600}.kitem span{font-size:12px;color:var(--muted);display:block}
.kitem .ch{color:var(--muted-2)}.kitem .ch svg{width:18px;height:18px;stroke:currentColor}

/* skill matrix */
.skill{margin-bottom:14px}.skill:last-child{margin-bottom:0}
.skill .sh{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}.skill .sh b{font-weight:600}.skill .sh span{font-family:var(--fd);font-weight:700;color:var(--muted)}

/* reward grid */
.rewards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:13px}
.reward{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;text-align:center;box-shadow:var(--sh-2)}
.reward .e{font-size:38px}.reward b{display:block;font-size:14px;font-weight:600;margin-top:8px}
.reward .cost{font-family:var(--fd);font-weight:700;color:#D89A16;margin:6px 0 10px;font-size:14px}
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:12px}
.bg-item{text-align:center;padding:14px 8px;border-radius:16px;background:var(--surface-2);border:1px solid var(--line)}
.bg-item.locked{opacity:.42;filter:grayscale(1)}
.bg-item .e{font-size:32px}.bg-item span{font-size:11px;font-weight:600;display:block;margin-top:5px}

/* admin stats */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-bottom:18px}
.statc{background:#fff;border:1px solid var(--line);border-radius:18px;padding:17px;box-shadow:var(--sh-2)}
.statc .v{font-family:var(--fd);font-weight:800;font-size:27px;line-height:1}
.statc .k{font-size:12px;color:var(--muted);margin-top:5px}
.statc.a .v{color:var(--blue)}.statc.b .v{color:var(--green)}.statc.c .v{color:var(--amber)}.statc.d .v{color:var(--pink)}

/* flashcard */
.flash{perspective:1200px;max-width:520px;margin:0 auto}
.flash-inner{position:relative;height:280px;transition:transform .6s;transform-style:preserve-3d;cursor:pointer}
.flash-inner.flip{transform:rotateY(180deg)}
.flash-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:22px;display:grid;place-items:center;text-align:center;padding:28px;box-shadow:var(--sh-2)}
.flash-front{background:#fff;border:1px solid var(--line)}
.flash-back{background:linear-gradient(150deg,var(--green-2),var(--green));color:#fff;transform:rotateY(180deg)}
.flash-face .q{font-family:var(--fd);font-weight:700;font-size:22px}.flash-face .hint{position:absolute;bottom:16px;font-size:12px;opacity:.6}

/* quiz */
.qopt{width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:14px 16px;font-size:14.5px;margin-bottom:10px;transition:.15s;display:flex;align-items:center;gap:11px}
.qopt:hover{border-color:var(--green)}
.qopt .k{width:26px;height:26px;border-radius:8px;background:var(--surface-2);display:grid;place-items:center;font-family:var(--fd);font-weight:700;font-size:13px;flex-shrink:0}
.qopt.correct{border-color:var(--green);background:var(--green-bg)}.qopt.correct .k{background:var(--green);color:#fff}
.qopt.wrong{border-color:var(--danger);background:#FCEDEA}.qopt.wrong .k{background:var(--danger);color:#fff}

/* poll */
.poll-opt{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:9px;cursor:pointer;font-size:14px;font-weight:500}
.poll-opt .fillp{position:absolute;inset:0;background:var(--green-bg);width:0;transition:width .7s;z-index:0}
.poll-opt .lbl,.poll-opt .pct{position:relative;z-index:1}
.poll-opt .pct{float:right;font-family:var(--fd);font-weight:700;color:var(--green)}

/* modal / bottom sheet */
.overlay{position:fixed;inset:0;z-index:60;background:rgba(10,20,40,.42);display:none;align-items:flex-end;justify-content:center}
.overlay.show{display:flex;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{width:100%;max-width:520px;max-height:88vh;overflow-y:auto;background:#fff;border-radius:26px 26px 0 0;padding:22px;animation:up .3s cubic-bezier(.2,.9,.3,1)}
@keyframes up{from{transform:translateY(60px)}to{transform:none}}
@media(min-width:560px){.overlay{align-items:center}.sheet{border-radius:24px;animation:pop .25s}}
.sheet .sh{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.sheet .sh .x{margin-left:auto;width:34px;height:34px;border-radius:11px;background:var(--surface-2);display:grid;place-items:center;font-size:16px;color:var(--muted)}
.ptitle{font-family:var(--fd);font-weight:700;font-size:19px}

/* activity dropdown */
.pop{position:fixed;inset:0;z-index:70;background:rgba(10,20,40,.3);display:none}
.pop.show{display:flex;justify-content:center;align-items:flex-start}
.pop-wrap{width:100%;max-width:1240px;padding:70px clamp(16px,3vw,40px) 0;display:flex;justify-content:flex-end}
.pop-panel{width:100%;max-width:370px;max-height:74vh;overflow-y:auto;background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:var(--sh-3);transform-origin:top right;animation:pin .2s}
@keyframes pin{from{opacity:0;transform:translateY(-10px) scale(.97)}to{opacity:1;transform:none}}
.actlist{margin-top:10px}
.actrow{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--line);cursor:pointer}.actrow:last-child{border:none}
.actrow .ic{width:40px;height:40px;border-radius:12px;background:var(--surface-2);display:grid;place-items:center;font-size:18px;flex-shrink:0}
.actrow .tx{flex:1;min-width:0}.actrow .tx>div:first-child{font-size:13.5px;line-height:1.4}.actrow .tm{font-size:11.5px;color:var(--muted-2);margin-top:2px}
.actrow.unread{background:rgba(95,158,56,.05)}
.dotn{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}

/* toast + confetti */
#toast{position:fixed;left:50%;bottom:38px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:15px;font-size:13.5px;font-weight:600;z-index:80;box-shadow:0 14px 34px -12px rgba(0,0,0,.5);opacity:0;transition:.25s;pointer-events:none;max-width:90vw;text-align:center}
#toast.show{opacity:1}
#cv{position:fixed;inset:0;pointer-events:none;z-index:75}

/* bottom nav (mobile) */
.bnav{display:none}
@media(max-width:999px){
  .shell{grid-template-columns:1fr}.side{display:none}
  .main{padding:12px 16px calc(78px + env(safe-area-inset-bottom))}
  .grid2{grid-template-columns:1fr}
  .mobile-brand{display:flex;align-items:center;flex-shrink:0}.mobile-brand img{height:30px;width:auto}
  .greet{flex:1;min-width:0}
  .top .hi{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .top .nm{font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .search{display:none}.chip{display:none}.top-right{gap:0}
  .hero h1,.hero p{max-width:100%}.hero h1{font-size:23px}.hero .leaf{opacity:.28}
  .pop-wrap{padding-top:64px}

let PE_PHOTO=null;
function openProfileEdit(){PE_PHOTO=null;modal(`<div class="sh"><div class="ptitle">✏️ แก้ไขโปรไฟล์</div><button class="x" onclick="closeModal()">✕</button></div>
 <div style="text-align:center;margin-bottom:8px"><div class="av" id="pe-av" style="width:88px;height:88px;border-radius:26px;background:${avc(ME.name)};display:grid;place-items:center;margin:0 auto;font-family:var(--fd);font-weight:700;color:#fff;font-size:30px;overflow:hidden">${avImg(ME.photo,ME.name)}</div>
   <label class="btn btn-o btn-sm" style="margin-top:12px;cursor:pointer">📷 เปลี่ยนรูปโปรไฟล์<input type="file" accept="image/*" hidden onchange="pickPE(this)"></label></div>
 <div class="field"><label>ชื่อที่แสดง</label><input class="inp" id="pe-name" value="${ME.name.replace(/"/g,'&quot;')}" maxlength="40" placeholder="ชื่อเล่นของคุณ"></div>
 <button class="btn btn-g" style="width:100%" id="pe-save" onclick="saveProfile()">บันทึก</button>`);}
function pickPE(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{PE_PHOTO=e.target.result;document.getElementById("pe-av").innerHTML=`<img src="${PE_PHOTO}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit"/>`;};r.readAsDataURL(f);}
async function saveProfile(){
  const name=document.getElementById("pe-name").value.trim()||ME.name;
  const btn=document.getElementById("pe-save"); btn.textContent="กำลังบันทึก...";
  let photoUrl=ME.photo;
  if(PE_PHOTO){ photoUrl=await uploadImage(PE_PHOTO,"avatar"); }
  ME.name=name; ME.photo=photoUrl;
  if(SERVER) await api("updateProfile",{name,photo:photoUrl});
  // อัปเดตหน้าจอ
  ["tb-nm","sf-nm"].forEach(i=>document.getElementById(i).textContent=ME.name);
  const sf=document.getElementById("sf-av"); if(sf) sf.innerHTML=avImg(ME.photo,ME.name);

/* =================== ACTIVITY / BELL =================== */
let ATAB="noti";
function bellCount(){return NOTIFS.filter(n=>n.unread).length;}
function updateBell(){const b=document.getElementById("bell-b");const n=bellCount();b.textContent=n;b.style.display=n?"grid":"none";}
async function openActivity(){ATAB="noti";document.getElementById("act").classList.add("show");paintAct();if(SERVER){await hydrateActivity();paintAct();}}
function closeActivity(){document.getElementById("act").classList.remove("show");updateBell();}
function paintAct(){
  let body;
  if(ATAB==="noti"){NOTIFS.forEach(n=>n.unread=false);if(SERVER)api("markNotifsRead");body=NOTIFS.map(n=>`<div class="actrow"><div class="ic">${n.ic}</div><div class="tx"><div>${n.text}</div><div class="tm">${n.time}</div></div></div>`).join("");}
  else{body=ANNOUNCE.map(a=>`<div class="actrow"><div class="ic">${a.ic}</div><div class="tx"><div>${a.t}</div><div class="tm">${a.s}</div></div></div>`).join("");}
  document.getElementById("act-body").innerHTML=`<div class="ptitle" style="font-size:17px;margin-bottom:12px">การแจ้งเตือน</div>
   <div class="seg" style="margin-bottom:6px"><button class="${ATAB==='noti'?'on':''}" onclick="setAT('noti')">แจ้งเตือน</button><button class="${ATAB==='ann'?'on':''}" onclick="setAT('ann')">ประกาศ</button></div>
   <div class="actlist">${body}</div>`;
}
function setAT(t){ATAB=t;paintAct();}

/* =================== MODAL / TOAST / CONFETTI =================== */
function modal(html){document.getElementById("modal-body").innerHTML=html;document.getElementById("modal").classList.add("show");}
function closeModal(){document.getElementById("modal").classList.remove("show");}
let tt;function toast(m){const e=document.getElementById("toast");e.textContent=m;e.classList.add("show");clearTimeout(tt);tt=setTimeout(()=>e.classList.remove("show"),1700);}
const cv=document.getElementById("cv"),cx=cv.getContext("2d");function fit(){cv.width=innerWidth;cv.height=innerHeight}fit();addEventListener("resize",fit);
let ps=[];function burst(){const x=innerWidth/2,y=innerHeight*.4,c=["#7EAF3C","#2CC0A0","#4F7CFF","#FF9F3E","#FF6B9D","#F5B93C"];for(let i=0;i<70;i++){const a=Math.random()*6.28,s=Math.random()*8+3;ps.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-4,r:Math.random()*5+3,c:c[i%c.length],l:1,rot:Math.random()*6,vr:(Math.random()-.5)*.4})}if(ps.length<=70)requestAnimationFrame(loop)}
function loop(){cx.clearRect(0,0,cv.width,cv.height);ps.forEach(p=>{p.vy+=.28;p.x+=p.vx;p.y+=p.vy;p.l-=.012;p.rot+=p.vr;cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot);cx.globalAlpha=Math.max(0,p.l);cx.fillStyle=p.c;cx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.6);cx.restore()});ps=ps.filter(p=>p.l>0&&p.y<cv.height+40);if(ps.length)requestAnimationFrame(loop);else cx.clearRect(0,0,cv.width,cv.height)}

/* =================== CHIPS / LOGIN =================== */
function refreshChips(){["tb-coin","sf-coin"].forEach(i=>document.getElementById(i).textContent=ME.coins);["tb-xp","sf-xp"].forEach(i=>document.getElementById(i).textContent=ME.xp.toLocaleString());}
async function doLogin(){
  const id=document.getElementById("li-id").value.trim(),pin=document.getElementById("li-pin").value.trim();
  if(SERVER&&(!id||!pin)){document.getElementById("li-err").textContent="กรอกรหัสและ PIN";return;}
  if(SERVER){const r=await api("login",{id,pin});if(!r.ok){document.getElementById("li-err").textContent=r.msg||"เข้าสู่ระบบไม่สำเร็จ";return;}Object.assign(ME,r.user,{token:r.token});}
  enterApp();
}
function enterApp(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  const hr=new Date().getHours();document.getElementById("tb-hi").textContent=(hr<12?"สวัสดีตอนเช้า ☀️":hr<17?"สวัสดีตอนบ่าย 🌤️":"สวัสดีตอนเย็น 🌙");
  ["tb-nm","sf-nm"].forEach(i=>document.getElementById(i).textContent=ME.name);
  document.getElementById("sf-av").innerHTML=avImg(ME.photo,ME.name);
  document.getElementById("sf-sub").textContent="ทีม "+ME.team+" · อันดับ #"+ME.rank;
  buildNav();refreshChips();updateBell();go("home");
  if(SERVER){hydrateProfile();hydrateActivity();}
}
document.getElementById("li-pin").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
function logout(){location.reload();}
